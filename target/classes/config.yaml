# Dynamic configuration for Parser

# Pressure value is always multiplied by X before display/use
pressure:
  # Multiplier X - applied to raw pressure read (e.g. 1.0 = no change, 10.0 = scale up)
  multiplier: 10.0

output:
  # Fields to include in parsed output
  showTimestamp: true
  showPressure: true
  showTemperature: true
  showBattery: true
